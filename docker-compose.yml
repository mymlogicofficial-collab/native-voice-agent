version: '3.8'

services:
  postgres:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: voice_agent_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always

  mongodb:
    image: mongo:latest
    restart: always
    volumes:
      - mongo_data:/data/db

  rocketchat:
    image: rocketchat/rocket.chat
    restart: always
    environment:
      - ROOT_URL=http://localhost:3000/
      - MONGO_URL=mongodb://mongodb:27017/rocketchat
      - MONGO_OPLOG=true
      - PORT=3000
      - AUTH_MECHANISM=SCRAM-SHA-1
    depends_on:
      - mongodb

  flask_backend:
    build: ./flask_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/voice_agent_db
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongodb:27017
    ports:
      - '5000:5000'
    depends_on:
      - postgres
      - redis
      - mongodb

volumes:
  postgres_data:
  mongo_data: